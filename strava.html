<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-53EQM5NS08"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-53EQM5NS08');
    </script>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Connect your Strava account and see a heatmap of your recent bike rides.">
    <meta name="author" content="Lucca Zachmann">

    <title>Bike Ride Heatmap — Lucca Zachmann</title>

    <!-- Bootstrap Core CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css" type="text/css">

    <!-- Custom Fonts -->
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/main.css" type="text/css">

    <!-- Leaflet (map + heat layer) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJ4E70Nsc90LXU7dnJ/x1qrAaKg7c=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <style>
      /* ---- page-specific styling, matched to the site's navy palette ---- */
      #map {
        height: 68vh;
        min-height: 420px;
        width: 100%;
        border-radius: 8px;
        background: #1E2460;
        box-shadow: 0 10px 40px rgba(30, 36, 96, 0.25);
      }
      .strava-btn {
        display: inline-block;
        background: #FC4C02;           /* Strava orange */
        color: #fff !important;
        font-weight: 700;
        border: none;
        border-radius: 999px;
        padding: 0.7rem 1.8rem;
        text-decoration: none;
        cursor: pointer;
        transition: transform .15s, box-shadow .15s, opacity .15s;
      }
      .strava-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(252,76,2,.4); color:#fff; }
      .strava-btn[disabled] { opacity: .5; cursor: default; transform: none; box-shadow: none; }
      .stat-row { margin: 1.25rem 0; }
      .stat-box { display: inline-block; min-width: 120px; margin: 0 .75rem; }
      .stat-num { font-size: 2rem; font-weight: 800; color: #1E2460; line-height: 1; }
      .stat-label { font-size: .8rem; letter-spacing: .05em; text-transform: uppercase; color: #6b7280; }
      #status { min-height: 1.4rem; color: #1E2460; margin: .75rem 0; }
      .muted { color: #6b7280; font-size: .85rem; }
    </style>
</head>

<body>

  <section id="strava">
    <div class="container">
      <div class="row">
        <div class="col-lg-10 col-lg-offset-1 text-center">

          <h2 class="section-heading">Bike Ride Heatmap</h2>
          <hr class="primary text-center">
          <p class="text-faded-main-dark">
            Connect your own Strava account to see a heatmap of your recent rides.
            Your data is fetched live, shown only in your browser, and never stored.
          </p>

          <p id="connect-wrap">
            <a id="connect" class="strava-btn">Connect with Strava</a>
          </p>

          <div id="status"></div>

          <!-- Stats (hidden until data loads) -->
          <div class="stat-row" id="stats" style="display:none;">
            <div class="stat-box"><div class="stat-num" id="stat-rides">–</div><div class="stat-label">Rides</div></div>
            <div class="stat-box"><div class="stat-num" id="stat-km">–</div><div class="stat-label">Total km</div></div>
            <div class="stat-box"><div class="stat-num" id="stat-elev">–</div><div class="stat-label">Elev (m)</div></div>
          </div>

          <div id="map" style="display:none;"></div>
          <p class="muted" id="map-note" style="display:none; margin-top:.6rem;"></p>

        </div>
      </div>
    </div>

    <div class="col-lg-12 text-center" style="margin-top:2rem;">
      <a href="spatialVisualizations.html" class="btn btn-primary btn-xl">Back</a>
    </div>
  </section>

  <script>
  // ============================================================
  //  CONFIG  — fill these in after registering your Strava app
  //  and deploying the Cloudflare Worker (see strava-worker/README.md)
  // ============================================================
  const STRAVA_CLIENT_ID = "39680";                                      // public, safe to expose
  const WORKER_URL       = "https://strava-heatmap.luccalino.workers.dev"; // your Cloudflare Worker
  // ------------------------------------------------------------

  // redirect_uri = this exact page. The Strava app's "Authorization
  // Callback Domain" must be this host (e.g. luccalino.github.io).
  const REDIRECT_URI = location.origin + location.pathname;
  const SCOPE = "activity:read_all";

  const $ = (id) => document.getElementById(id);
  const setStatus = (msg) => { $("status").textContent = msg || ""; };

  function notConfigured() {
    return STRAVA_CLIENT_ID.startsWith("REPLACE") || WORKER_URL.includes("REPLACE");
  }

  // ---- Google-encoded polyline decoder (no dependency) ----
  function decodePolyline(str) {
    let index = 0, lat = 0, lng = 0, coords = [];
    while (index < str.length) {
      let b, shift = 0, result = 0;
      do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lat += ((result & 1) ? ~(result >> 1) : (result >> 1));
      shift = 0; result = 0;
      do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
      lng += ((result & 1) ? ~(result >> 1) : (result >> 1));
      coords.push([lat / 1e5, lng / 1e5]);
    }
    return coords;
  }

  function startOAuth() {
    if (notConfigured()) {
      setStatus("⚙️ This page isn't configured yet — set STRAVA_CLIENT_ID and WORKER_URL in strava.html.");
      return;
    }
    const url = "https://www.strava.com/oauth/authorize"
      + "?client_id=" + encodeURIComponent(STRAVA_CLIENT_ID)
      + "&response_type=code"
      + "&redirect_uri=" + encodeURIComponent(REDIRECT_URI)
      + "&approval_prompt=auto"
      + "&scope=" + encodeURIComponent(SCOPE);
    window.location.href = url;
  }

  async function exchangeAndLoad(code) {
    setStatus("Connecting to Strava…");
    $("connect-wrap").style.display = "none";
    try {
      const res = await fetch(WORKER_URL + "/exchange", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
      });
      if (!res.ok) throw new Error("Worker responded " + res.status);
      const data = await res.json();
      renderHeatmap(data);
    } catch (err) {
      setStatus("❌ Could not load rides: " + err.message);
      $("connect-wrap").style.display = "";
      $("connect").textContent = "Try again";
    }
  }

  function renderHeatmap(data) {
    const rides = (data.activities || []).filter(a => a.polyline);
    if (!rides.length) {
      setStatus("No rides with GPS data found in your recent activities. 🚴");
      $("connect-wrap").style.display = "";
      return;
    }

    // Decode all polylines → points + running totals
    let allPoints = [], totalKm = 0, totalElev = 0;
    const bounds = [];
    rides.forEach(a => {
      const pts = decodePolyline(a.polyline);
      allPoints = allPoints.concat(pts);
      pts.forEach(p => bounds.push(p));
      totalKm += (a.distance || 0) / 1000;
      totalElev += (a.total_elevation_gain || 0);
    });

    // Stats
    $("stat-rides").textContent = rides.length;
    $("stat-km").textContent = Math.round(totalKm).toLocaleString();
    $("stat-elev").textContent = Math.round(totalElev).toLocaleString();
    $("stats").style.display = "";

    const name = data.athlete && data.athlete.firstname ? (", " + data.athlete.firstname) : "";
    setStatus("Here are your last " + rides.length + " rides with GPS data" + name + " 🔥");

    // Map
    $("map").style.display = "";
    const map = L.map("map", { zoomControl: true, attributionControl: true });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      maxZoom: 19
    }).addTo(map);

    L.heatLayer(allPoints, {
      radius: 5, blur: 6, maxZoom: 14,
      gradient: { 0.2: "#2c7fb8", 0.5: "#fdae61", 0.8: "#f03b20", 1.0: "#ffffbf" }
    }).addTo(map);

    map.fitBounds(bounds, { padding: [30, 30] });
    $("map-note").textContent = "Heatmap built from Strava summary polylines · warmer = ridden more often.";
    $("map-note").style.display = "";
    // ensure tiles render after the container becomes visible
    setTimeout(() => map.invalidateSize(), 200);
  }

  // ---- boot ----
  (function init() {
    $("connect").addEventListener("click", startOAuth);

    const params = new URLSearchParams(location.search);
    if (params.get("error")) {                       // user denied access
      setStatus("Strava authorization was cancelled.");
      return;
    }
    const code = params.get("code");
    if (code) {
      // clean the code out of the URL so a refresh doesn't re-use it
      history.replaceState({}, document.title, REDIRECT_URI);
      exchangeAndLoad(code);
    } else if (notConfigured()) {
      setStatus("⚙️ Set up your Strava app + Cloudflare Worker, then fill in the CONFIG block in strava.html.");
    }
  })();
  </script>

</body>
</html>
